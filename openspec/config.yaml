schema: spec-driven

context: |
  Tech stack: Bun monorepo, Expo (Mobile), Hono (Backend), Drizzle (DB).
  Architecture: Vertical slicing, functional components, monorepo.
  Testing: Jest (Mobile), TDD prioritized.
  Style: ESLint, Prettier, NativeWind v4.

strict_tdd: true

testing:
  test_runner:
    command: "make test"
    framework: "Jest"
  test_layers:
    unit: true
    integration: true
    e2e: false
  coverage:
    available: true
    command: "make test-coverage"
  quality_tools:
    linter: "make lint"
    type_checker: "make typecheck"
    formatter: "make format"

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions.
    - Load relevant coding skills for the project stack.
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

archived_changes:
  - name: refactor-backend-services-and-constants
    archived_date: "2026-05-23"
    status: completed
    summary: "Extracted database logic from routes (projects, ventures, products, services) into dedicated ProjectService, VentureService, and ProductService, centralized HTTP status codes, converted to named exports, and verified all 369 tests pass."
  - name: remediate-spread-vulnerabilities
    archived_date: "2026-05-23"
    status: completed
    summary: "Remediated 4 React props-spreading vulnerabilities, suppressed 3 false-positive object-injection findings, and passed all Gentleman Guardian Angel pre-commit checks."
  - name: venture-store
    archived_date: "2026-05-20"
    status: completed
    summary: "Created Zustand venture store with full CRUD, aligned service with backend (PUT, DELETE), 241 tests pass"
  - name: add-ventures-crud
    archived_date: "2026-05-20"
    status: completed
    summary: "Added PUT and DELETE endpoints for ventures CRUD with soft delete, 204 response, and 404 handling"
  - name: web-deployment-modes
    archived_date: "2026-05-13"
    status: completed
    summary: "Enabled dual web deployment modes (mock/API) via Makefile targets and GitHub Actions workflow_dispatch"
