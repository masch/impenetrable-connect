name: React Doctor

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: millionco/react-doctor@241444d35287f1b4551cca921a65fb2fa67949b6
        with:
          diff: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on: error
