name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "development"
        type: choice
        options:
          - production
          - development

concurrency:
  group: deploy-backend-${{ github.ref }}-${{ github.event.inputs.environment || 'auto' }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || 'development' }}
    runs-on: ubuntu-latest
    # The 'environment' key maps to GitHub Environments for secrets access
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && github.event_name == 'push' && 'production') || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set Environment Context
        id: set-env
        env:
          ENV_INPUT: ${{ github.event.inputs.environment }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$ENV_INPUT" != "" ]; then
            echo "env=$ENV_INPUT" >> $GITHUB_OUTPUT
          elif [ "$GITHUB_REF" == "refs/heads/main" ] && [ "$GITHUB_EVENT_NAME" == "push" ]; then
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "env=development" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@7f8c1b2c8fb0920412802db167476e197c55d38a # v4.2.0
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e685f02c6136a53f0907e59c253d717ec2 # v2.2.0
        with:
          bun-version: latest
          cache: true

      - name: Install Dependencies
        run: make setup

      - name: Deploy to Cloudflare
        run: |
          if [ "${{ steps.set-env.outputs.env }}" == "production" ]; then
            make backend-deploy
          else
            make backend-deploy-dev
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
