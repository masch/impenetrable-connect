name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - "apps/backend/**"
      - "!**/*.md"
      - "!openspec/**"
      - "!apps/mobile/assets/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Deployment mode"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - mock
          - api

jobs:
  deploy-mock:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'mock' || github.event.inputs.mode == 'both') || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: make setup

      - name: Export and Deploy Web (Mock)
        run: |
          make eas-export-web-mock
          make eas-deploy-web-mock
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  deploy-api:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'api' || github.event.inputs.mode == 'both') || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: make setup

      - name: Export and Deploy Web (API)
        run: |
          make eas-export-web-api
          make eas-deploy-web-api
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
