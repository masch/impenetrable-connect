name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - "apps/backend/**"
      - "!**/*.md"
      - "!openspec/**"
      - "!apps/mobile/assets/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Deployment mode"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - mock
          - api

jobs:
  deploy-web-mock:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'mock' || github.event.inputs.mode == 'both') || github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e685f02c6136a53f0907e59c253d717ec2 # v2.2.0
        with:
          bun-version: latest

      - name: Install Dependencies
        run: make setup

      - name: Deploy Web (Mock Mode)
        run: make eas-deploy-web-mock
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  deploy-web-api:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'api' || github.event.inputs.mode == 'both') || github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e685f02c6136a53f0907e59c253d717ec2 # v2.2.0
        with:
          bun-version: latest

      - name: Install Dependencies
        run: make setup

      - name: Deploy Web (API Mode)
        run: make eas-deploy-web-api
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
