name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - "apps/backend/**"
      - "!**/*.md"
      - "!openspec/**"
      - "!apps/mobile/assets/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Deployment mode"
        required: true
        default: "mock"
        type: choice
        options:
          - mock
          - api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_MODE: ${{ github.event.inputs.mode || 'mock' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: make setup

      - name: Export Web Build
        run: |
          if [ "$DEPLOY_MODE" = "api" ]; then
            make eas-export-web-api
          else
            make eas-export-web-mock
          fi

      - name: Deploy to EAS Hosting
        run: |
          if [ "$DEPLOY_MODE" = "api" ]; then
            make eas-deploy-web-api
          else
            make eas-deploy-web-mock
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
