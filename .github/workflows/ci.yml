# CI Workflow - Lint and Type Check

name: CI

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - "apps/backend/**"
      - "!**/*.md"
      - "!openspec/**"
      - "!apps/mobile/assets/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - "apps/backend/**"
      - "!**/*.md"
      - "!openspec/**"
      - "!apps/mobile/assets/**"

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: impenetrable
          POSTGRES_PASSWORD: password
          POSTGRES_DB: impenetrable_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://impenetrable:password@localhost:5432/impenetrable_db
      JWT_SECRET: ci-dummy-secret-for-tests
      CI: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e685f02c6136a53f0907e59c253d717ec2 # v2.2.0
        with:
          bun-version: latest

      - name: Install Dependencies
        run: make setup

      - name: Create dummy .env for Makefile
        run: echo "DATABASE_URL=$DATABASE_URL" > .env

      - name: Lint
        run: make lint

      - name: Typecheck
        run: make typecheck

      - name: Prepare Database
        run: |
          make db-push
          make seed

      - name: Run Tests
        run: make test
